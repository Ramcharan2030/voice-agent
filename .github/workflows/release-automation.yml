name: Release Please

on:
  # Releases are optional for self-hosted forks. Run this manually when a
  # repository owner actually wants release-please to create/update a release.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Config files location
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # A PAT is optional. The repository token is sufficient unless the
          # generated release must trigger additional privileged workflows.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
